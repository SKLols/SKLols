<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Sourabh Lolge — Focus Areas</title>
  <desc>Six domain cards: Sensor Systems, 3D Perception, ADAS Validation, SLAM and Mapping, Data Pipelines, Algo Trading</desc>

  <style>
    .card { fill: #ffffff; stroke: #e0e0e0; stroke-width: 0.5; }
    .card-dark { fill: #161b22; stroke: #30363d; stroke-width: 0.5; }
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; fill: #24292f; }
    .title-dark { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; fill: #e6edf3; }
    .sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #57606a; }
    .sub-dark { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #8b949e; }
    .emoji { font-size: 18px; }

    @media (prefers-color-scheme: dark) {
      .card { fill: #161b22; stroke: #30363d; }
      .title { fill: #e6edf3; }
      .sub { fill: #8b949e; }
    }
  </style>

  <!-- Card width: 100px, gap: 13px, 6 cards, start x=10 -->
  <!-- Card 1 — Sensor Systems -->
  <rect x="10" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="10" y="10" width="100" height="3" rx="2" fill="#378ADD"/>
  <text x="55" y="42" text-anchor="middle" class="emoji">📡</text>
  <text x="55" y="66" text-anchor="middle" class="title">Sensor Systems</text>
  <text x="55" y="84" text-anchor="middle" class="sub">LiDAR · Radar</text>
  <text x="55" y="98" text-anchor="middle" class="sub">Camera · GNSS</text>
  <text x="55" y="112" text-anchor="middle" class="sub">IMU</text>

  <!-- Card 2 — 3D Perception -->
  <rect x="123" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="123" y="10" width="100" height="3" rx="2" fill="#1D9E75"/>
  <text x="173" y="42" text-anchor="middle" class="emoji">🧠</text>
  <text x="173" y="66" text-anchor="middle" class="title">3D Perception</text>
  <text x="173" y="84" text-anchor="middle" class="sub">Segmentation</text>
  <text x="173" y="98" text-anchor="middle" class="sub">OOD Detection</text>
  <text x="173" y="112" text-anchor="middle" class="sub">Anomaly</text>

  <!-- Card 3 — ADAS Validation -->
  <rect x="236" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="236" y="10" width="100" height="3" rx="2" fill="#7F77DD"/>
  <text x="286" y="42" text-anchor="middle" class="emoji">🚗</text>
  <text x="286" y="66" text-anchor="middle" class="title">ADAS Validation</text>
  <text x="286" y="84" text-anchor="middle" class="sub">CANoe · CAPL</text>
  <text x="286" y="98" text-anchor="middle" class="sub">CarMaker · V2X</text>
  <text x="286" y="112" text-anchor="middle" class="sub">ROS2</text>

  <!-- Card 4 — SLAM & Mapping -->
  <rect x="349" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="349" y="10" width="100" height="3" rx="2" fill="#D85A30"/>
  <text x="399" y="42" text-anchor="middle" class="emoji">🗺️</text>
  <text x="399" y="66" text-anchor="middle" class="title">SLAM &amp; Mapping</text>
  <text x="399" y="84" text-anchor="middle" class="sub">KISS-ICP</text>
  <text x="399" y="98" text-anchor="middle" class="sub">Pose Estimation</text>
  <text x="399" y="112" text-anchor="middle" class="sub">ROS2</text>

  <!-- Card 5 — Data Pipelines -->
  <rect x="462" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="462" y="10" width="100" height="3" rx="2" fill="#BA7517"/>
  <text x="512" y="42" text-anchor="middle" class="emoji">⚙️</text>
  <text x="512" y="66" text-anchor="middle" class="title">Data Pipelines</text>
  <text x="512" y="84" text-anchor="middle" class="sub">Collection</text>
  <text x="512" y="98" text-anchor="middle" class="sub">Annotation</text>
  <text x="512" y="112" text-anchor="middle" class="sub">Processing</text>

  <!-- Card 6 — Algo Trading -->
  <rect x="575" y="10" width="100" height="178" rx="8" class="card"/>
  <rect x="575" y="10" width="100" height="3" rx="2" fill="#888780"/>
  <text x="625" y="42" text-anchor="middle" class="emoji">📈</text>
  <text x="625" y="66" text-anchor="middle" class="title">Algo Trading</text>
  <text x="625" y="84" text-anchor="middle" class="sub">Scanners</text>
  <text x="625" y="98" text-anchor="middle" class="sub">Indicators</text>
  <text x="625" y="112" text-anchor="middle" class="sub">Telegram Alerts</text>

</svg>
